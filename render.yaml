services:
  - type: web
    name: opspilot-backend
    runtime: python

    rootDir: backend

    buildCommand: pip install -r requirements.txt

    startCommand: uvicorn app:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: IBM_API_KEY
        sync: false

      - key: IBM_DEPLOYMENT_ENDPOINT
        sync: false